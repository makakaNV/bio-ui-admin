<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/admin-mini-logo.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biospectrum Admin</title>
    <script>
      // Restore path after GitHub Pages 404 redirect
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          var hash = window.location.search.match(/[?&]hash=([^&]*)/);
          window.history.replaceState(null, null,
            decodeURIComponent(p[1]) + (hash ? '#' + decodeURIComponent(hash[1]) : '')
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
