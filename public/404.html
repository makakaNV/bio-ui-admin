<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Biospectrum Admin</title>
    <script>
      // GitHub Pages SPA redirect: encode current path into ?p= and redirect to index.html
      (function() {
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?p=' + encodeURIComponent(l.pathname + l.search) +
          (l.hash ? '&hash=' + encodeURIComponent(l.hash.slice(1)) : '')
        );
      })();
    </script>
  </head>
  <body></body>
</html>
